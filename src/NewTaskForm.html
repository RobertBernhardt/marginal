<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>New Task</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background-color: var(--tg-theme-bg-color, #ffffff);
        color: var(--tg-theme-text-color, #222222);
        padding: 20px;
        margin: 0;
      }
      .form-group { margin-bottom: 15px; }
      label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 0.9em; }
      input {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        border: 1px solid #ccc;
        border-radius: 8px;
        background-color: var(--tg-theme-secondary-bg-color, #f0f0f0);
        color: var(--tg-theme-text-color);
        font-size: 1em;
      }
      button {
        width: 100%;
        padding: 12px;
        background-color: var(--tg-theme-button-color, #3390ec);
        color: var(--tg-theme-button-text-color, #ffffff);
        border: none;
        border-radius: 8px;
        font-size: 1.1em;
        font-weight: bold;
        cursor: pointer;
        margin-top: 10px;
      }
      .hint { font-size: 0.8em; color: gray; margin-top: 3px; }
    </style>
  </head>
  <body>
    <h3>Create New Task</h3>
    <div class="form-group">
      <label>Task Name</label>
      <input type="text" id="name" placeholder="e.g. Read Physics Book">
    </div>
    <div class="form-group">
      <label>Best Case Value (€)</label>
      <input type="number" id="best" placeholder="50">
    </div>
    <div class="form-group">
      <label>Worst Case Value (€)</label>
      <input type="number" id="worst" placeholder="5">
    </div>
    <div class="form-group">
      <label>Probability of Best Case (0-1)</label>
      <input type="number" id="prob" step="0.1" placeholder="0.8">
    </div>
    <div class="form-group">
      <label>Expected Duration (min)</label>
      <input type="number" id="duration" placeholder="60">
    </div>
    <button id="submit">Add Task</button>

    <script>
      const tg = window.Telegram.WebApp;
      tg.expand();

      document.getElementById('submit').addEventListener('click', () => {
        const data = {
          name: document.getElementById('name').value,
          best: document.getElementById('best').value,
          worst: document.getElementById('worst').value,
          prob: document.getElementById('prob').value,
          duration: document.getElementById('duration').value
        };
        
        if (!data.name || !data.best || !data.worst || !data.prob || !data.duration) {
          alert('Please fill in all fields!');
          return;
        }

        tg.sendData(JSON.stringify(data));
        tg.close();
      });
    </script>
  </body>
</html>
